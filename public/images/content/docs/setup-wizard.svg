  <text x="400" y="251" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#a0a0a0">English</text>
  <rect x="200" y="280" width="400" height="40" rx="6" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>

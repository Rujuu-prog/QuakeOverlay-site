<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="460" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="250" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- OBS Sources panel mock -->
  <rect x="100" y="90" width="250" height="300" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="225" y="118" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e0e0e0">ソース</text>
  <line x1="100" y1="130" x2="350" y2="130" stroke="#0f3460" stroke-width="1"/>
  <text x="130" y="155" font-family="sans-serif" font-size="13" fill="#a0a0a0">🎮 ゲームキャプチャ</text>
  <text x="130" y="180" font-family="sans-serif" font-size="13" fill="#a0a0a0">📷 ウェブカメラ</text>
  <!-- + button highlighted -->
  <rect x="100" y="360" width="40" height="30" rx="4" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="2"/>
  <text x="120" y="381" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#00d4ff">+</text>
  <!-- Dropdown menu -->
  <rect x="380" y="120" width="300" height="250" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <text x="530" y="155" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">映像キャプチャデバイス</text>
  <text x="530" y="185" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">ウィンドウキャプチャ</text>
  <rect x="390" y="198" width="280" height="30" rx="4" fill="#00d4ff" opacity="0.15"/>
  <text x="530" y="219" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">🌐 ブラウザ</text>
  <text x="530" y="250" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">画像</text>
  <text x="530" y="280" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">テキスト (GDI+)</text>
  <!-- Arrow -->
  <line x1="145" y1="375" x2="380" y2="215" stroke="#00d4ff" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="375,218 385,212 380,222" fill="#00d4ff"/>
  <!-- Description -->
  <text x="400" y="430" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">OBS — ソース「+」→「ブラウザ」を選択</text>
  <text x="400" y="465" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×500 | PNG形式推奨</text>
</svg>
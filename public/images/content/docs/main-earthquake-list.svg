<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="360" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="250" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Table header -->
  <rect x="50" y="80" width="700" height="30" rx="4" fill="#0f3460"/>
  <text x="100" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">日時</text>
  <text x="230" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">震源地</text>
  <text x="380" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">M値</text>
  <text x="460" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">震度</text>
  <text x="550" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">深さ</text>
  <text x="660" y="100" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a0a0a0">津波</text>
  <!-- Row 1 - Intensity 5 (orange/red) -->
  <rect x="50" y="115" width="700" height="35" rx="2" fill="#FF4500" opacity="0.1"/>
  <rect x="50" y="115" width="4" height="35" fill="#FF4500"/>
  <text x="100" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">10:25</text>
  <text x="230" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">千葉県東方沖</text>
  <text x="380" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">5.2</text>
  <text x="460" y="137" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#FF4500">5弱</text>
  <text x="550" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">20km</text>
  <text x="660" y="137" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">なし</text>
  <!-- Row 2 - Intensity 3 (yellow) -->
  <rect x="50" y="155" width="700" height="35" rx="2" fill="#B8B800" opacity="0.08"/>
  <rect x="50" y="155" width="4" height="35" fill="#B8B800"/>
  <text x="100" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">09:42</text>
  <text x="230" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">茨城県沖</text>
  <text x="380" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">4.1</text>
  <text x="460" y="177" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B8B800">3</text>
  <text x="550" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">40km</text>
  <text x="660" y="177" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">なし</text>
  <!-- Row 3 - Intensity 1 (blue) -->
  <rect x="50" y="195" width="700" height="35" rx="2" fill="#6E9ECF" opacity="0.08"/>
  <rect x="50" y="195" width="4" height="35" fill="#6E9ECF"/>
  <text x="100" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">08:15</text>
  <text x="230" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">福島県沖</text>
  <text x="380" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">2.8</text>
  <text x="460" y="217" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6E9ECF">1</text>
  <text x="550" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#e0e0e0">50km</text>
  <text x="660" y="217" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">なし</text>
  <!-- Row 4 - Intensity 1 (blue) -->
  <rect x="50" y="235" width="700" height="35" rx="2" fill="#6E9ECF" opacity="0.05"/>
  <rect x="50" y="235" width="4" height="35" fill="#6E9ECF"/>
  <text x="100" y="257" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">07:30</text>
  <text x="230" y="257" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">宮城県沖</text>
  <text x="380" y="257" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">3.0</text>
  <text x="460" y="257" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#6E9ECF">1</text>
  <text x="550" y="257" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">60km</text>
  <text x="660" y="257" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">なし</text>
  <!-- Description -->
  <text x="400" y="320" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">地震情報リスト — 震度別色分け表示</text>
  <text x="400" y="345" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">震度1=青系 / 震度3=黄系 / 震度5=赤系</text>
  <text x="400" y="370" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×400 | PNG形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="460" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="250" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Earthquake card -->
  <rect x="200" y="80" width="400" height="280" rx="12" fill="#16213e" stroke="#00d4ff" stroke-width="2"/>
  <!-- Header -->
  <rect x="200" y="80" width="400" height="40" rx="12" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="106" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#00d4ff">地震情報</text>
  <!-- Fields -->
  <text x="230" y="150" font-family="sans-serif" font-size="13" fill="#a0a0a0">発生日時:</text>
  <text x="340" y="150" font-family="sans-serif" font-size="13" fill="#e0e0e0">2024-01-15 10:30:22</text>
  <text x="230" y="185" font-family="sans-serif" font-size="13" fill="#a0a0a0">震源地:</text>
  <text x="340" y="185" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">千葉県東方沖</text>
  <text x="230" y="220" font-family="sans-serif" font-size="13" fill="#a0a0a0">マグニチュード:</text>
  <text x="380" y="220" font-family="sans-serif" font-size="14" fill="#e0e0e0">M4.5</text>
  <text x="230" y="255" font-family="sans-serif" font-size="13" fill="#a0a0a0">最大震度:</text>
  <rect x="320" y="238" width="50" height="26" rx="4" fill="#eab308" opacity="0.2"/>
  <text x="345" y="257" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#eab308">3</text>
  <text x="230" y="290" font-family="sans-serif" font-size="13" fill="#a0a0a0">深さ:</text>
  <text x="340" y="290" font-family="sans-serif" font-size="13" fill="#e0e0e0">30km</text>
  <text x="230" y="325" font-family="sans-serif" font-size="13" fill="#a0a0a0">津波情報:</text>
  <text x="340" y="325" font-family="sans-serif" font-size="13" fill="#22c55e">なし</text>
  <!-- Callout lines -->
  <line x1="600" y1="150" x2="660" y2="120" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="124" font-family="sans-serif" font-size="11" fill="#00d4ff">発生日時</text>
  <line x1="600" y1="185" x2="660" y2="165" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="169" font-family="sans-serif" font-size="11" fill="#00d4ff">震源地</text>
  <line x1="600" y1="220" x2="660" y2="210" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="214" font-family="sans-serif" font-size="11" fill="#00d4ff">マグニチュード</text>
  <line x1="600" y1="255" x2="660" y2="255" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="259" font-family="sans-serif" font-size="11" fill="#00d4ff">最大震度</text>
  <line x1="600" y1="290" x2="660" y2="300" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="304" font-family="sans-serif" font-size="11" fill="#00d4ff">深さ</text>
  <line x1="600" y1="325" x2="660" y2="345" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="665" y="349" font-family="sans-serif" font-size="11" fill="#00d4ff">津波情報</text>
  <!-- Description -->
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">地震情報カード — 要素図解</text>
  <text x="400" y="445" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">各要素に引き出し線でラベルを付けた図解</text>
  <text x="400" y="470" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×500 | PNG形式推奨</text>
</svg>
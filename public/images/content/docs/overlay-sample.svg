<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="20" y="20" width="1240" height="680" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="490" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="640" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Simulated stream background -->
  <rect x="80" y="80" width="1120" height="500" rx="8" fill="#0d0d1a" stroke="#0f3460" stroke-width="1"/>
  <text x="640" y="300" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#333">配信画面 / ゲーム画面</text>
  <text x="640" y="340" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#333">Stream / Game Content</text>
  <!-- Overlay card in top-right -->
  <rect x="830" y="100" width="340" height="180" rx="10" fill="#16213e" stroke="#00d4ff" stroke-width="2" opacity="0.95"/>
  <rect x="830" y="100" width="340" height="35" rx="10" fill="#00d4ff" opacity="0.2"/>
  <text x="1000" y="123" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">地震情報</text>
  <text x="860" y="158" font-family="sans-serif" font-size="13" fill="#e0e0e0">発生: 2024-01-15 10:30</text>
  <text x="860" y="180" font-family="sans-serif" font-size="13" fill="#e0e0e0">震源: 千葉県東方沖</text>
  <text x="860" y="202" font-family="sans-serif" font-size="13" fill="#e0e0e0">M4.5 / 深さ30km</text>
  <rect x="860" y="215" width="60" height="30" rx="4" fill="#eab308" opacity="0.2"/>
  <text x="890" y="235" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#eab308">震度3</text>
  <text x="940" y="236" font-family="sans-serif" font-size="12" fill="#22c55e">津波なし</text>
  <!-- Webcam area mock -->
  <rect x="80" y="400" width="200" height="180" rx="4" fill="#1a1a2e" opacity="0.5"/>
  <text x="180" y="500" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#444">カメラ</text>
  <!-- Description -->
  <text x="640" y="630" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#e0e0e0">配信画面上のオーバーレイ表示例</text>
  <text x="640" y="660" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a0a0a0">ゲーム画面の右上に地震情報カードが表示されるイメージ</text>
  <text x="640" y="690" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 1280×720 | PNG形式推奨</text>
</svg>
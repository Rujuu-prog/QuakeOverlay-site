<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="560" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="300" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="450" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- 2x2 Grid of screen positions -->
  <!-- Top-Left position -->
  <rect x="60" y="80" width="380" height="200" rx="6" fill="#0d0d1a" stroke="#0f3460" stroke-width="1"/>
  <text x="250" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">配信画面</text>
  <rect x="70" y="90" width="120" height="60" rx="4" fill="#16213e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="130" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff">地震情報</text>
  <text x="130" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0a0">千葉県 M4.5</text>
  <text x="250" y="270" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00d4ff">左上 (top-left)</text>
  <!-- Top-Right position -->
  <rect x="460" y="80" width="380" height="200" rx="6" fill="#0d0d1a" stroke="#0f3460" stroke-width="1"/>
  <text x="650" y="190" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">配信画面</text>
  <rect x="710" y="90" width="120" height="60" rx="4" fill="#16213e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="770" y="115" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff">地震情報</text>
  <text x="770" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0a0">千葉県 M4.5</text>
  <text x="650" y="270" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00d4ff">右上 (top-right)</text>
  <!-- Bottom-Left position -->
  <rect x="60" y="300" width="380" height="200" rx="6" fill="#0d0d1a" stroke="#0f3460" stroke-width="1"/>
  <text x="250" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">配信画面</text>
  <rect x="70" y="430" width="120" height="60" rx="4" fill="#16213e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="130" y="455" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff">地震情報</text>
  <text x="130" y="470" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0a0">千葉県 M4.5</text>
  <text x="250" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00d4ff">左下 (bottom-left)</text>
  <!-- Bottom-Right position -->
  <rect x="460" y="300" width="380" height="200" rx="6" fill="#0d0d1a" stroke="#0f3460" stroke-width="1"/>
  <text x="650" y="400" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">配信画面</text>
  <rect x="710" y="430" width="120" height="60" rx="4" fill="#16213e" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
  <text x="770" y="455" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00d4ff">地震情報</text>
  <text x="770" y="470" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#a0a0a0">千葉県 M4.5</text>
  <text x="650" y="490" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00d4ff">右下 (bottom-right)</text>
  <!-- Description -->
  <text x="450" y="540" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">表示位置プリセット 4パターン比較</text>
  <text x="450" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 900×600 | PNG形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="410" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="200" y="30" width="400" height="36" rx="18" fill="#ff6b35" opacity="0.2"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#ff6b35">GIF希望 — PLACEHOLDER</text>
  <!-- Step 1: Click button -->
  <rect x="60" y="90" width="300" height="200" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="210" y="115" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a0a0a0">Step 1: ボタンクリック</text>
  <rect x="100" y="140" width="220" height="100" rx="6" fill="#1a1a2e"/>
  <rect x="120" y="180" width="120" height="36" rx="6" fill="#00d4ff" opacity="0.3" stroke="#00d4ff" stroke-width="2"/>
  <text x="180" y="203" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#00d4ff">テスト表示</text>
  <!-- Arrow -->
  <text x="400" y="195" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#00d4ff">→</text>
  <!-- Step 2: Overlay appears -->
  <rect x="440" y="90" width="300" height="200" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <text x="590" y="115" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#a0a0a0">Step 2: オーバーレイ表示</text>
  <rect x="460" y="130" width="260" height="140" rx="6" fill="#1a1a2e"/>
  <!-- Mini overlay card -->
  <rect x="530" y="140" width="170" height="110" rx="6" fill="#16213e" stroke="#00d4ff" stroke-width="1"/>
  <text x="615" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#00d4ff">地震情報</text>
  <text x="615" y="182" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0e0e0">東京都23区</text>
  <text x="615" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0a0">M4.5 震度3</text>
  <text x="615" y="218" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a0a0a0">深さ30km</text>
  <text x="615" y="236" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#22c55e">津波なし</text>
  <!-- Description -->
  <text x="400" y="340" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">テスト表示の動作デモ</text>
  <text x="400" y="365" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ff6b35">GIF推奨: ボタンクリック→オーバーレイ表示の一連の動作</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">3-5秒程度のGIFアニメーション推奨</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×450 | GIF形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <rect x="20" y="20" width="860" height="560" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="300" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="450" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- App window mock -->
  <rect x="100" y="80" width="700" height="420" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <!-- Header -->
  <rect x="100" y="80" width="700" height="40" rx="8" fill="#0f3460"/>
  <text x="130" y="106" font-family="sans-serif" font-size="14" fill="#e0e0e0">QuakeOverlay v1.0.0</text>
  <text x="760" y="106" text-anchor="end" font-family="sans-serif" font-size="14" fill="#a0a0a0">— □ ×</text>
  <!-- Label: Header -->
  <line x1="810" y1="100" x2="840" y2="100" stroke="#00d4ff" stroke-width="1"/>
  <text x="845" y="104" font-family="sans-serif" font-size="11" fill="#00d4ff">ヘッダー</text>
  <!-- Status bar -->
  <rect x="110" y="130" width="680" height="30" rx="4" fill="#1a1a2e"/>
  <circle cx="130" cy="145" r="6" fill="#22c55e"/>
  <text x="145" y="149" font-family="sans-serif" font-size="11" fill="#a0a0a0">接続中 | P2P Earthquake | 最終更新: 10:30</text>
  <!-- Label: Status -->
  <line x1="810" y1="145" x2="840" y2="145" stroke="#00d4ff" stroke-width="1"/>
  <text x="845" y="149" font-family="sans-serif" font-size="11" fill="#00d4ff">ステータスバー</text>
  <!-- Earthquake list -->
  <rect x="110" y="170" width="680" height="220" rx="4" fill="#1a1a2e"/>
  <rect x="120" y="180" width="660" height="30" rx="4" fill="#0f3460" opacity="0.5"/>
  <text x="130" y="200" font-family="sans-serif" font-size="12" fill="#eab308">● 10:25 千葉県東方沖 M4.2 震度3 深さ30km</text>
  <rect x="120" y="215" width="660" height="30" rx="4" fill="transparent"/>
  <text x="130" y="235" font-family="sans-serif" font-size="12" fill="#6E9ECF">● 09:15 茨城県沖 M3.1 震度1 深さ40km</text>
  <rect x="120" y="250" width="660" height="30" rx="4" fill="transparent"/>
  <text x="130" y="270" font-family="sans-serif" font-size="12" fill="#6E9ECF">● 08:42 福島県沖 M2.8 震度1 深さ50km</text>
  <!-- Label: List -->
  <line x1="810" y1="250" x2="840" y2="250" stroke="#00d4ff" stroke-width="1"/>
  <text x="845" y="254" font-family="sans-serif" font-size="11" fill="#00d4ff">地震情報リスト</text>
  <!-- Control panel -->
  <rect x="110" y="400" width="680" height="50" rx="4" fill="#1a1a2e"/>
  <rect x="130" y="410" width="100" height="30" rx="4" fill="#00d4ff" opacity="0.2" stroke="#00d4ff" stroke-width="1"/>
  <text x="180" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00d4ff">テスト表示</text>
  <rect x="245" y="410" width="80" height="30" rx="4" fill="#0f3460"/>
  <text x="285" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">設定</text>
  <rect x="340" y="410" width="80" height="30" rx="4" fill="#0f3460"/>
  <text x="380" y="430" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">ログ</text>
  <!-- Label: Controls -->
  <line x1="810" y1="425" x2="840" y2="425" stroke="#00d4ff" stroke-width="1"/>
  <text x="845" y="429" font-family="sans-serif" font-size="11" fill="#00d4ff">コントロール</text>
  <!-- Footer -->
  <rect x="100" y="460" width="700" height="30" rx="0" fill="#0f3460" opacity="0.5"/>
  <text x="130" y="480" font-family="monospace" font-size="11" fill="#a0a0a0">http://localhost:8080/overlay</text>
  <line x1="810" y1="475" x2="840" y2="475" stroke="#00d4ff" stroke-width="1"/>
  <text x="845" y="479" font-family="sans-serif" font-size="11" fill="#00d4ff">フッター</text>
  <!-- Description -->
  <text x="450" y="540" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">メイン画面 全体レイアウト（アノテーション付き）</text>
  <text x="450" y="565" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 900×600 | PNG形式推奨</text>
</svg>
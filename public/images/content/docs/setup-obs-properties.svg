<svg xmlns="http://www.w3.org/2000/svg" width="600" height="700" viewBox="0 0 600 700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="700" fill="url(#bg)"/>
  <rect x="20" y="20" width="560" height="660" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="150" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="300" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Properties dialog mock -->
  <rect x="60" y="80" width="480" height="540" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <rect x="60" y="80" width="480" height="36" rx="8" fill="#0f3460"/>
  <text x="300" y="104" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e0e0e0">ブラウザソースのプロパティ</text>
  <!-- URL field -->
  <text x="90" y="150" font-family="sans-serif" font-size="13" fill="#a0a0a0">URL:</text>
  <rect x="90" y="158" width="420" height="32" rx="4" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1"/>
  <text x="100" y="179" font-family="monospace" font-size="12" fill="#00d4ff">http://localhost:8080/overlay</text>
  <!-- Width -->
  <text x="90" y="220" font-family="sans-serif" font-size="13" fill="#a0a0a0">幅:</text>
  <rect x="90" y="228" width="150" height="32" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="100" y="249" font-family="monospace" font-size="13" fill="#e0e0e0">1920</text>
  <!-- Height -->
  <text x="280" y="220" font-family="sans-serif" font-size="13" fill="#a0a0a0">高さ:</text>
  <rect x="280" y="228" width="150" height="32" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="290" y="249" font-family="monospace" font-size="13" fill="#e0e0e0">1080</text>
  <!-- FPS -->
  <text x="90" y="290" font-family="sans-serif" font-size="13" fill="#a0a0a0">FPS:</text>
  <rect x="90" y="298" width="150" height="32" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="100" y="319" font-family="monospace" font-size="13" fill="#e0e0e0">30</text>
  <!-- Checkboxes -->
  <rect x="90" y="360" width="16" height="16" rx="3" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="115" y="374" font-family="sans-serif" font-size="13" fill="#a0a0a0">表示されていないときにソースをシャットダウン</text>
  <rect x="90" y="395" width="16" height="16" rx="3" fill="#00d4ff" stroke="#00d4ff" stroke-width="1"/>
  <text x="98" y="407" font-family="sans-serif" font-size="10" fill="#1a1a2e">✓</text>
  <text x="115" y="409" font-family="sans-serif" font-size="13" fill="#e0e0e0">シーンがアクティブになったときにブラウザの表示を更新</text>
  <!-- Custom CSS -->
  <text x="90" y="455" font-family="sans-serif" font-size="13" fill="#a0a0a0">カスタムCSS: （空欄）</text>
  <!-- Buttons -->
  <rect x="310" y="560" width="100" height="36" rx="6" fill="#00d4ff" opacity="0.8"/>
  <text x="360" y="583" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">OK</text>
  <rect x="420" y="560" width="100" height="36" rx="6" fill="#0f3460"/>
  <text x="470" y="583" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a0a0a0">キャンセル</text>
  <!-- Description -->
  <text x="300" y="650" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e0e0e0">OBS ブラウザソース プロパティ設定</text>
  <text x="300" y="675" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 600×700 | PNG形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="260" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="250" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Three status bars -->
  <!-- Green - Connected -->
  <rect x="60" y="90" width="200" height="60" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <circle cx="90" cy="120" r="10" fill="#22c55e"/>
  <text x="110" y="116" font-family="sans-serif" font-size="13" font-weight="bold" fill="#22c55e">正常接続</text>
  <text x="110" y="134" font-family="sans-serif" font-size="11" fill="#a0a0a0">Connected</text>
  <!-- Yellow - Reconnecting -->
  <rect x="300" y="90" width="200" height="60" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <circle cx="330" cy="120" r="10" fill="#eab308"/>
  <text x="350" y="116" font-family="sans-serif" font-size="13" font-weight="bold" fill="#eab308">再接続中</text>
  <text x="350" y="134" font-family="sans-serif" font-size="11" fill="#a0a0a0">Reconnecting</text>
  <!-- Red - Error -->
  <rect x="540" y="90" width="200" height="60" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="1"/>
  <circle cx="570" cy="120" r="10" fill="#ef4444"/>
  <text x="590" y="116" font-family="sans-serif" font-size="13" font-weight="bold" fill="#ef4444">接続エラー</text>
  <text x="590" y="134" font-family="sans-serif" font-size="11" fill="#a0a0a0">Error</text>
  <!-- Description -->
  <text x="400" y="200" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">ステータスバー 接続状態3パターン</text>
  <text x="400" y="225" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a0a0a0">緑=正常接続 / 黄=再接続中 / 赤=接続エラー</text>
  <text x="400" y="255" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×300 | PNG形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="20" y="20" width="760" height="560" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="250" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="400" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Settings window mock -->
  <rect x="80" y="80" width="640" height="430" rx="8" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <rect x="80" y="80" width="640" height="36" rx="8" fill="#0f3460"/>
  <text x="400" y="104" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#e0e0e0">設定</text>
  <!-- Tabs -->
  <rect x="80" y="116" width="640" height="36" fill="#1a1a2e"/>
  <rect x="80" y="116" width="120" height="36" fill="#16213e" stroke="#00d4ff" stroke-width="0 0 2 0"/>
  <text x="140" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="#00d4ff">全般</text>
  <text x="260" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">通知</text>
  <text x="380" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">表示</text>
  <text x="500" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">フィルター</text>
  <text x="620" y="140" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">詳細</text>
  <line x1="80" y1="152" x2="200" y2="152" stroke="#00d4ff" stroke-width="2"/>
  <!-- Settings content -->
  <text x="110" y="190" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">基本設定</text>
  <!-- Language -->
  <text x="110" y="225" font-family="sans-serif" font-size="13" fill="#a0a0a0">表示言語:</text>
  <rect x="250" y="208" width="200" height="28" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="260" y="227" font-family="sans-serif" font-size="12" fill="#e0e0e0">日本語 ▾</text>
  <!-- Startup -->
  <text x="110" y="265" font-family="sans-serif" font-size="13" fill="#a0a0a0">スタートアップに登録:</text>
  <rect x="300" y="250" width="40" height="22" rx="11" fill="#00d4ff"/>
  <circle cx="330" cy="261" r="8" fill="white"/>
  <!-- Auto update -->
  <text x="110" y="305" font-family="sans-serif" font-size="13" fill="#a0a0a0">アップデート確認:</text>
  <rect x="300" y="290" width="40" height="22" rx="11" fill="#00d4ff"/>
  <circle cx="330" cy="301" r="8" fill="white"/>
  <!-- Data source section -->
  <text x="110" y="350" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">データソース</text>
  <text x="110" y="385" font-family="sans-serif" font-size="13" fill="#a0a0a0">地震データソース:</text>
  <rect x="280" y="368" width="200" height="28" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="290" y="387" font-family="sans-serif" font-size="12" fill="#e0e0e0">P2P Earthquake ▾</text>
  <!-- Port -->
  <text x="110" y="425" font-family="sans-serif" font-size="13" fill="#a0a0a0">ポート番号:</text>
  <rect x="280" y="408" width="100" height="28" rx="4" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <text x="290" y="427" font-family="monospace" font-size="12" fill="#e0e0e0">8080</text>
  <!-- Buttons -->
  <rect x="480" y="470" width="100" height="30" rx="4" fill="#0f3460"/>
  <text x="530" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a0a0a0">リセット</text>
  <rect x="595" y="470" width="100" height="30" rx="4" fill="#00d4ff" opacity="0.8"/>
  <text x="645" y="490" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#1a1a2e">保存</text>
  <!-- Description -->
  <text x="400" y="550" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">設定画面 — タブ構成のスクリーンショット</text>
  <text x="400" y="575" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 800×600 | PNG形式推奨</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <rect x="20" y="20" width="960" height="560" rx="12" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="350" y="30" width="300" height="36" rx="18" fill="#00d4ff" opacity="0.15"/>
  <text x="500" y="55" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#00d4ff">PLACEHOLDER IMAGE</text>
  <!-- Theme 1: Dark -->
  <rect x="50" y="80" width="270" height="180" rx="8" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <rect x="60" y="90" width="250" height="130" rx="6" fill="#0d0d1a"/>
  <rect x="70" y="100" width="160" height="80" rx="4" fill="#16213e" stroke="#333" stroke-width="1"/>
  <text x="150" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0e0e0">地震情報 M4.5</text>
  <text x="150" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a0a0a0">千葉県 震度3</text>
  <text x="185" y="250" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">ダーク</text>
  <!-- Theme 2: Light -->
  <rect x="365" y="80" width="270" height="180" rx="8" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <rect x="375" y="90" width="250" height="130" rx="6" fill="#e8e8e8"/>
  <rect x="385" y="100" width="160" height="80" rx="4" fill="#ffffff" stroke="#ccc" stroke-width="1"/>
  <text x="465" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">地震情報 M4.5</text>
  <text x="465" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#666">千葉県 震度3</text>
  <text x="500" y="250" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">ライト</text>
  <!-- Theme 3: Semi-transparent -->
  <rect x="680" y="80" width="270" height="180" rx="8" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <rect x="690" y="90" width="250" height="130" rx="6" fill="#2a2a4a"/>
  <rect x="700" y="100" width="160" height="80" rx="4" fill="#16213e" opacity="0.6" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="780" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e0e0e0" opacity="0.9">地震情報 M4.5</text>
  <text x="780" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a0a0a0" opacity="0.7">千葉県 震度3</text>
  <text x="815" y="250" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">セミトランスペアレント</text>
  <!-- Theme 4: Minimal -->
  <rect x="150" y="290" width="270" height="180" rx="8" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <rect x="160" y="300" width="250" height="130" rx="6" fill="#0d0d1a"/>
  <rect x="170" y="330" width="140" height="40" rx="2" fill="transparent" stroke="#555" stroke-width="1"/>
  <text x="240" y="345" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#ccc">M4.5 千葉県</text>
  <text x="240" y="360" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#888">震度3</text>
  <text x="285" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">ミニマル</text>
  <!-- Theme 5: Retro -->
  <rect x="530" y="290" width="270" height="180" rx="8" fill="#1a1a2e" stroke="#0f3460" stroke-width="1"/>
  <rect x="540" y="300" width="250" height="130" rx="6" fill="#001100"/>
  <rect x="550" y="310" width="160" height="80" rx="0" fill="#002200" stroke="#00ff00" stroke-width="1"/>
  <text x="630" y="340" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff00">地震情報</text>
  <text x="630" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#00cc00">千葉県 M4.5 震度3</text>
  <text x="630" y="375" text-anchor="middle" font-family="monospace" font-size="8" fill="#009900">深さ30km 津波なし</text>
  <text x="665" y="460" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e0e0e0">レトロ</text>
  <!-- Description -->
  <text x="500" y="530" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#e0e0e0">5つのプリセットテーマ 比較グリッド</text>
  <text x="500" y="555" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a0a0a0">同じ地震情報を各テーマで表示した比較</text>
  <text x="500" y="578" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#666">推奨サイズ: 1000×600 | PNG形式推奨</text>
</svg>